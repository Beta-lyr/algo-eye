<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ALGO::VIZ favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d130d"/>
      <stop offset="1" stop-color="#070a07"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- terminal chip background -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)" stroke="#2f4a2f" stroke-width="1.5"/>

  <!-- faint scanlines for CRT feel (visible at large sizes, vanish at 16px) -->
  <g opacity="0.18">
    <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)" opacity="0"/>
    <line x1="2" y1="14" x2="62" y2="14" stroke="#33ff66" stroke-width="0.5" opacity="0.5"/>
    <line x1="2" y1="24" x2="62" y2="24" stroke="#33ff66" stroke-width="0.5" opacity="0.5"/>
    <line x1="2" y1="34" x2="62" y2="34" stroke="#33ff66" stroke-width="0.5" opacity="0.5"/>
    <line x1="2" y1="44" x2="62" y2="44" stroke="#33ff66" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- sorting bars (mid-execution snapshot) -->
  <g filter="url(#glow)">
    <rect x="11" y="28" width="6" height="24" rx="1" fill="#33ff66"/>
    <rect x="20" y="34" width="6" height="18" rx="1" fill="#33ff66"/>
    <rect x="29" y="16" width="6" height="36" rx="1" fill="#ffb000"/>
    <rect x="38" y="30" width="6" height="22" rx="1" fill="#33ff66"/>
    <rect x="47" y="24" width="6" height="28" rx="1" fill="#33ff66"/>
  </g>

  <!-- baseline axis -->
  <line x1="9" y1="53" x2="55" y2="53" stroke="#2e5e3e" stroke-width="1" opacity="0.55"/>

  <!-- corner cursor accent tying to terminal identity -->
  <rect x="7" y="7" width="2.5" height="6" rx="0.5" fill="#33ff66" filter="url(#softGlow)"/>
</svg>
